<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css"
    integrity="sha384-DyZ88mC6Up2uqS4h/KRgHuoeGwBcD4Ng9SiP4dIRy0EXTlnuz47vAwmeGwVChigm" crossorigin="anonymous">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;300;400;500;700&display=swap');

    .background {
      position: absolute;
      display: block;
      top: 0;
      left: 0;
      z-index: -10;
      background: black;
    }

    .progress-container {
      position: relative;
      left: 99.8%;
      top: 0;
      width: 3px;
      height: 100%;
      background: var(--background-black-);
      position: fixed;
      z-index: 100;

    }

    .progress-bar {
      border-radius: 10px;
      height: 0;
      background: var(--hover-font-);
      width: 100%;
    }

    :root {
      --background-black-: rgb(0, 0, 0);
      --primary-font-: rgba(255, 255, 255, 0.925);
      --hover-font-: wheat;
    }

    ::-webkit-scrollbar {
      display: none;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      margin: 0;
      padding: 0;
      color: black;
      box-sizing: border-box;
    }

    nav {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      display: flex;
      color: white;
      padding: 20px;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      padding: 0 20px;
      align-items: center;
      cursor: pointer;
    }

    .logo img {
      margin-right: 20px;
      width: 60px;
      height: 60px;
    }

    .hero-container {
      width: 100%;
      transform: translateY(-50%);
      top: 50%;
      position: absolute;
      display: flex;
    }

    .image-1 {
      width: 40%;
    }

    .clip-image-1 {
      transition: 500ms all ease-in-out;
      width: 100%;
      clip-path: circle(40% at 50% 50%);
    }

    .hero-info {
      display: flex;
      flex-direction: column;
      padding-top: 5%;
      color: var(--primary-font-);
    }

    .hero-info h3 {
      line-height: 3rem;
      font-size: 3rem;
      font-weight: 300;
    }

    .hero-info h3 span {
      font-weight: 600;
      color: var(--hover-font-);
    }

    .hero-info p {
      margin-top: 20px;
      line-height: 3rem;
      width: 50%;
      word-wrap: break-word;
      word-break: keep-all;
      font-size: 2rem;
    }

    .hero-info a {
      text-decoration: none;
      color: var(--hover-font-);
      width: 15%;
      text-align: center;
      margin-top: 20px;
      border-radius: 20px;
      padding: 10px 20px;
      border: 1px var(--hover-font-) solid;
    }

    .hero-info a:hover {
      border: 1px var(--primary-font-) solid;
      color: var(--primary-font-);
    }

    .scroll-down-container {
      transition: 0.1s all ease-in-out;
      cursor: pointer;
      opacity: 0.5;
      width: 5%;
      position: absolute;
      left: 80%;
      top: 70%;
      display: flex;
      flex-direction: column;
      justify-self: center;
      align-items: center;
    }

    .scroll-down-container:hover {
      opacity: 1;
    }

    .scroll-down-container p {
      transition: 1s all ease-in;
      font-size: 1rem;
      transform: rotate(180deg);
      color: var(--primary-font-);
    }

    .scroll-down-container a {
      text-decoration: none;
      color: var(--primary-font-);
    }

    .scroll-down-container h5 {
      font-size: 1rem;
      font-weight: 400;
      writing-mode: vertical-lr;
      text-orientation: upright;
      text-transform: uppercase;
      color: var(--primary-font-);
    }

    .social-links {
      position: fixed;
      top: 50%;
      left: 97%;
      width: 2%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .social-links i {

      cursor: pointer;
      margin: 10px;
      opacity: 0.5;
      color: var(--primary-font-);
      transition: 100ms all;
    }

    .social-links i:hover {
      opacity: 1;
      cursor: pointer;
      margin: 10px;
      color: var(--primary-font-);
    }

    .work-content-container {
      padding: 50px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
    }

    .container {
      position: relative;
      width: 400px;
      height: 200px;
      margin: 20px;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0);
      transition: background 0.5s ease;
    }

    .container:hover .overlay {
      display: block;
      background: rgba(0, 0, 0, .3);
    }

    .grid-imgs {
      position: absolute;
      width: 400px;
      height: 200px;
      border-radius: 20PX;
      left: 0;
    }

    .title {
      opacity: 0;
      position: relative;
      left: 0%;
      top: -10%;
      font-weight: 700;
      font-size: 2rem;
      text-align: center;
      text-transform: uppercase;
      color: white;
      z-index: 1;
      transform: translateY(-50%);
      transition: all .5s ease;
    }

    .container:hover .title {
      left: 50%;
      transform: translateX(-50%);
      opacity: 1;
      top: 30%;
    }

    .button {
      position: relative;
      left: 0%;
      top: 90%;
      text-align: center;
      opacity: 0;
      transition: all .5s ease-in-out;
      z-index: 99;
    }

    .button a {
      border-radius: 20px;
      text-decoration: none;
      width: 50px;
      padding: 10px 20px;
      text-align: center;
      color: white;
      border: solid 2px white;
      z-index: 1;
    }

    .container:hover .button {
      opacity: 1;
      left: 0%;
      top: 50%;
    }

    #section-2 {
      position: absolute;
      top: 100vh;
      height: 100vh;
      width: 100%;
      background: var(--background-black-);
    }

    .heading {
      margin: 0;
      width: 100%;
      text-align: center;
    }

    .heading h1 {
      font-size: 2.5rem;
      font-weight: 400;
      color: var(--primary-font-);
    }
  </style>
</head>

<body>
  <!-- <script src="sample.js"></script>
 -->
  <div class="progress-container">
    <div class="progress-bar" id="myBar"></div>
  </div>
    <nav>
      <div class="logo">
        <img src="./img/download.png" alt="">
        <h1>
          Paritosh Gandre
        </h1>
      </div>

      <div class="navbar-hamburger">
        <i class="fas fa-bars"></i>
      </div>
    </nav>
    <div class="hero-container">
      <div class="image-1">
        <img src="./img/intro-image.png" alt="" class="clip-image-1">
      </div>
      <div class="hero-info">
        <h3>Hello, I'm <span>Paritosh Gandre</span> </h3>
        <p>I'm Ready to design your website and build it up with my skills.</p>
        <a href="./RESUME/index.html">RESUME</a>
      </div>
    </div>
    <div class="scroll-down-container">
      <h5> <a href="#heading"> Scrolldown </a></h5>
      <p> <i class="fas fa-arrow-up"></i></p>

    </div>
    <div class="social-links">
      <i class="fab fa-facebook"></i>
      <i class="fab fa-instagram"></i>
      <i class="fab fa-linkedin"></i>
    </div>

  <section id="section-2">
    <div class="heading" id="heading">
      <h1>All of my Work! (Cloned Websites)</h1>
    </div>
    <div class="work-content-container">

      <div class="container">
        <img src="./img/vet.png" class="grid-imgs" alt="" />
        <p class="title">VET</p>
        <div class="overlay"></div>
        <div class="button"><a href="#"> OPEN </a></div>
      </div>
      <div class="container">
        <img src="./img/amazon.png" class="grid-imgs" alt="" />
        <p class="title">AMAZON</p>
        <div class="overlay"></div>
        <div class="button"><a href="#"> OPEN </a></div>
      </div>
      <div class="container">
        <img src="./img/apple.png" class="grid-imgs" alt="" />
        <p class="title">APPLE</p>
        <div class="overlay"></div>
        <div class="button"><a href="#"> OPEN </a></div>
      </div>
      <div class="container">
        <img src="./img/cyber.png" class="grid-imgs" alt="" />
        <p class="title">CYBERPUNK</p>
        <div class="overlay"></div>
        <div class="button"><a href="#"> OPEN </a></div>
      </div>
      <div class="container">
        <img src="./img/ps5.png" class="grid-imgs" alt="" />
        <p class="title">PLAYSTATION 5</p>
        <div class="overlay"></div>
        <div class="button"><a href="#"> OPEN </a></div>
      </div>
      <div class="container">
        <img src="./img/starbucks.png" class="grid-imgs" alt="" />
        <p class="title">STARBUCKS</p>
        <div class="overlay"></div>
        <div class="button"><a href="#"> OPEN </a></div>
      </div>
    </div>
  </section>
  <canvas class="background"></canvas>

  <script type="text/javascript">
    window.onload = function () {
      Particles.init({
        selector: '.background',
        responsive: [
          {
            breakpoint:
              768
            ,
            options: {
              maxParticles:
                200
              ,
              color:
                '#48F2E3'
              ,
              connectParticles:
                false
            }
          }, {
            breakpoint:
              425
            ,
            options: {
              maxParticles:
                100
              ,
              connectParticles:
                false
            }
          }, {
            breakpoint:
              320
            ,
            options: {
              maxParticles:
                100,
                connectParticles:
                false
            }
          }
        ]
      });
    };
    window.onscroll = function () { myFunction() };

    function myFunction() {
      var winScroll = document.body.scrollTop || document.documentElement.scrollTop;
      var height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
      var scrolled = (winScroll / height) * 100;
      document.getElementById("myBar").style.height = scrolled + "%";
    }
  </script>
  <script src="./particles.min.js"></script>
</body>

</html>
