<script src="./particles.min.js"></script>
<script >
  window.onload = function () {
      Particles.init({
        selector: '.background',
        responsive: [
          {
            breakpoint:
              768
            ,
            options: {
              maxParticles:
                200
              ,
              color:
                '#48F2E3'
              ,
              connectParticles:
                false
            }
          }, {
            breakpoint:
              425
            ,
            options: {
              maxParticles:
                100
              ,
              connectParticles:
                false
            }
          }, {
            breakpoint:
              320
            ,
            options: {
              maxParticles:
                100,
                connectParticles:
                false
            }
          }
        ]
      });
    };
</script>
